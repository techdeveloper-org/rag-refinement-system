name: ci

# CI gate for the RAG Refinement System (STORY-005).
# Stages: lint -> typecheck -> test -> security (SAST + secrets scan).
# The security job HARD-blocks the pipeline on any Bandit finding or any
# secret detected by detect-secrets, satisfying the AGREED CONTRACT
# (sast/secrets <-> devops): block on any hardcoded key (NFR-007).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: pip install ".[dev]"
      - name: Ruff lint
        run: ruff check backend ingestion tests

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: pip install ".[dev]"
      - name: Mypy typecheck
        run: mypy backend ingestion

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: pip install ".[dev]"
      - name: Pytest
        run: pytest -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install security tooling
        run: pip install ".[dev]"
      - name: Bandit SAST (blocking)
        run: bandit -r backend ingestion router db
      - name: pip-audit SCA (blocking)
        run: pip-audit
      - name: detect-secrets scan (blocking)
        run: |
          detect-secrets scan backend ingestion router db tests \
            --exclude-files '\.env\.example$' > .secrets.scan.json
          python - <<'PY'
          import json
          import sys

          with open(".secrets.scan.json", encoding="utf-8") as handle:
              report = json.load(handle)

          findings = report.get("results", {})
          if findings:
              for path, secrets in findings.items():
                  for secret in secrets:
                      line = secret.get("line_number", "?")
                      kind = secret.get("type", "unknown")
                      print(f"SECRET DETECTED: {path}:{line} [{kind}]")
              print("detect-secrets found potential secrets; failing the build.")
              sys.exit(1)
          print("detect-secrets: no secrets detected.")
          PY

  frontend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dependencies
        run: npm ci
      - name: npm audit (production deps, blocking)
        run: npm audit --omit=dev --audit-level=low
