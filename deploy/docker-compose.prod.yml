# Production deployment stack for the RAG Refinement System.
#
# cloud-security-architect sign-off requirements baked in:
#   - NO secrets baked into the image or this file. Every secret is injected at
#     runtime from the host environment, which a secret manager populates
#     (AWS Secrets Manager / GCP Secret Manager / Vault / Doppler). The
#     ${VAR:?...} form FAILS THE DEPLOY if a required secret is unset, so the
#     stack can never start with a missing or empty credential.
#   - Non-root: the api image already runs as the unprivileged `app` user
#     (see ../Dockerfile). read_only root filesystem + no-new-privileges hardening.
#   - Network segmentation: data stores live on an internal-only network with no
#     published ports; only the reverse proxy is internet-facing (see notes in
#     ../docs/phase-G-deploy/deploy_runbook.md, "Reverse proxy / TLS").
#   - TLS is terminated at the reverse proxy (Caddy/Traefik/nginx or a cloud LB);
#     this compose exposes the api only on the internal network.
#   - Resource limits + restart policies on every service.
#
# This file is a production-shaped reference. A live cloud deploy (managed
# Postgres + managed/dedicated Qdrant + a real secret manager + a load balancer)
# is the recommended target; see the runbook. Bring it up with:
#   docker compose -f deploy/docker-compose.prod.yml up -d
# after exporting the required secrets into the environment.

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER via secret manager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD via secret manager}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB via secret manager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data
    # No published ports: Postgres is reachable only on the internal `data` network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
        reservations:
          memory: 512m
    security_opt:
      - no-new-privileges:true

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    environment:
      # Qdrant API-key auth (production). Reject anonymous access (ADR-2 store hardening,
      # threat model: embedding-inversion on stored chunks needs Qdrant access control).
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?set QDRANT_API_KEY via secret manager}
      QDRANT__SERVICE__ENABLE_TLS: "false"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - data
    # No published ports: Qdrant is reachable only on the internal `data` network.
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4g
        reservations:
          memory: 1g
    security_opt:
      - no-new-privileges:true

  api:
    image: ${API_IMAGE:?set API_IMAGE to the pushed registry tag, e.g. registry/rag-refinement-api:1.0.0}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY via secret manager}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY via secret manager}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-rag-refinement-system}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET via secret manager}
      API_KEY_SALT: ${API_KEY_SALT:?set API_KEY_SALT via secret manager}
      READINESS_TIMEOUT_SECONDS: ${READINESS_TIMEOUT_SECONDS:-2.0}
    networks:
      - data
      - edge
    # Exposed only to the reverse proxy via the `edge` network. The proxy
    # terminates TLS and is the sole internet-facing component. Do NOT publish
    # 8000 to the host in production.
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g
        reservations:
          memory: 256m

  frontend:
    # Serves the built personal-tool SPA (frontend/dist) as static assets behind
    # the same reverse proxy. The build is produced by `npm run build` in /frontend
    # (see ./frontend.Dockerfile) and contains no secrets — the SPA reads only the
    # public API base URL at build time (VITE_API_BASE_URL).
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?set VITE_API_BASE_URL, e.g. https://app.example.com/api}
    image: ${FRONTEND_IMAGE:-rag-refinement-frontend:latest}
    restart: unless-stopped
    networks:
      - edge
    expose:
      - "8080"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128m

networks:
  # Internal-only: Postgres + Qdrant + api. Not internet-reachable.
  data:
    internal: true
  # Edge: api + frontend reachable by the external reverse proxy / load balancer.
  edge: {}

volumes:
  postgres_data:
  qdrant_data:
