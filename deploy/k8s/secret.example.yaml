# TEMPLATE ONLY — DO NOT COMMIT A POPULATED COPY, DO NOT `kubectl apply` AS-IS.
#
# This documents the keys the `rag-secrets` Secret must contain. In production,
# generate this Secret from your secret manager — do NOT store plaintext secrets
# in Git. Recommended:
#   - External Secrets Operator (syncs from AWS/GCP/Vault into a k8s Secret), or
#   - Sealed Secrets / SOPS (encrypted-at-rest manifests safe to commit), or
#   - `kubectl create secret generic rag-secrets --from-env-file=<runtime-only file>`
#     executed in the deploy pipeline against a file that never touches Git.
#
# The values below are PLACEHOLDERS. No real credential belongs in this file.
apiVersion: v1
kind: Secret
metadata:
  name: rag-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql://USER:PASSWORD@rag-postgres:5432/rag" # __inject__
  QDRANT_URL: "http://rag-qdrant:6333"
  QDRANT_API_KEY: "__inject_from_secret_manager__"
  OPENAI_API_KEY: "__inject_from_secret_manager__"
  ANTHROPIC_API_KEY: "__inject_from_secret_manager__"
  COHERE_API_KEY: "__optional_inject_from_secret_manager__"
  LANGSMITH_API_KEY: "__optional_inject_from_secret_manager__"
  JWT_SECRET: "__inject_from_secret_manager__"
  API_KEY_SALT: "__inject_from_secret_manager__"
